<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Course Initialized | EduManage Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #312e81, #064e3b) !important;
            background-size: 400% 400% !important;
            animation: gradientBG 12s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
        }
    </style>
</head>

<body class="text-white">
    <div class="glass p-12 text-center shadow-2xl max-w-md w-full mx-4">
        <div class="text-6xl mb-6">✅</div>
        <h1
            class="text-3xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
            Course Initialized!
        </h1>
        <p class="text-blue-200 mb-8">Naya course system mein kamyabi se add kar diya gaya hai.</p>

        <div class="bg-white/5 p-6 rounded-2xl mb-8 text-left border border-white/10">
            <p class="text-xs uppercase text-blue-400 font-bold tracking-widest">Course Name</p>
            <p class="text-xl font-bold mb-4">{{ title }}</p>

            <p class="text-xs uppercase text-emerald-400 font-bold tracking-widest">Instructor</p>
            <p class="text-xl font-bold">{{ teacher }}</p>
        </div>

        <a href="/"
            class="block w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 py-4 rounded-xl font-bold transition-all transform hover:scale-105 active:scale-95 shadow-lg">
            Back to Dashboard
        </a>
    </div>
</body>

</html>
