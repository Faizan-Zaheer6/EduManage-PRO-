<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marks Entry — EduManage Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Outfit',sans-serif;background:#020617;color:#e2e8f0;display:flex;min-height:100vh}
        .sidebar{width:260px;min-height:100vh;background:#0b1120;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;padding:32px 20px;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
        .nav-link{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;text-decoration:none;color:#64748b;font-size:.9rem;font-weight:500;transition:all .2s;margin-bottom:4px}
        .main{margin-left:260px;flex:1;padding:40px 48px}
        .glass-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:32px;margin-bottom:32px}
        .form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
        .input-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;color:#475569;margin-bottom:8px}
        .input-group input{width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;outline:none}
        .btn-add{background:#10b981;color:#fff;padding:12px;border-radius:10px;font-weight:700;border:none;cursor:pointer;width:100%}
        .results-table{width:100%;border-collapse:collapse;margin-top:32px}
        .results-table th{text-align:left;font-size:11px;color:#475569;padding:16px;border-bottom:1px solid rgba(255,255,255,0.05)}
        .results-table td{padding:16px;font-size:.95rem;border-bottom:1px solid rgba(255,255,255,0.03)}
        .btn-del{color:#fb7185;background:none;border:none;cursor:pointer;font-size:12px;font-weight:700}
    </style>
</head>
<body>
<nav class="sidebar">
    <div class="sidebar-logo">⚡ EduManage Pro</div>
    <a href="/home" class="nav-link"><span>🏠</span>Home</a>
    <a href="/view-records" class="nav-link"><span>📁</span>Student Records</a>
</nav>
<main class="main">
    <div style="margin-bottom:32px">
        <h1 style="font-size:2rem;font-weight:900">Marks Management</h1>
        <p style="color:#64748b">Entering results for <strong>{{ student.name }}</strong> ({{ student.roll_no }})</p>
    </div>

    <div class="glass-card">
        <h3 style="margin-bottom:24px">Add / Update Subject Marks</h3>
        <form action="/student/{{ student.id }}/marks" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-grid">
                <div class="input-group">
                    <label>Subject Name</label>
                    <input type="text" name="subject" placeholder="e.g. Mathematics" required>
                </div>
                <div class="input-group">
                    <label>Marks Obtained</label>
                    <input type="number" step="0.1" name="marks" placeholder="e.g. 85" required>
                </div>
                <div class="input-group">
                    <label>Total Marks</label>
                    <input type="number" step="0.1" name="total" value="100" required>
                </div>
            </div>
            <button class="btn-add">Save Result</button>
        </form>

        <table class="results-table">
            <thead><tr><th>Subject</th><th>Score</th><th>Grade</th><th>GPA</th><th>Action</th></tr></thead>
            <tbody>
                {% for r in student.results %}
                <tr>
                    <td>{{ r.subject }}</td>
                    <td>{{ r.marks }} / {{ r.total }}</td>
                    <td style="font-weight:700;color:#34d399">{{ r.grade }}</td>
                    <td>{{ r.gpa }}</td>
                    <td>
                        <form action="/student/{{ student.id }}/marks/delete" method="post" onsubmit="return confirm('Delete this result?')">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                            <input type="hidden" name="subject" value="{{ r.subject }}">
                            <button class="btn-del">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
