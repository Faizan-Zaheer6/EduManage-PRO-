<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManage Pro | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #312e81, #064e3b);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }
        .orb-1 { width: 400px; height: 400px; background: #8b5cf6; top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #06b6d4; bottom: -80px; left: -80px; animation-delay: 4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            color: white;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px rgba(139,92,246,0.6));
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(to right, #c084fc, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo p {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            margin-top: 4px;
            font-weight: 300;
        }

        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            appearance: none;
        }
        select option { background: #1e3a8a; color: white; }
        input::placeholder { color: rgba(255,255,255,0.25); }
        input:focus, select:focus {
            border-color: #c084fc;
            background: rgba(192,132,252,0.1);
            box-shadow: 0 0 0 3px rgba(192,132,252,0.15);
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .role-option { display: none; }
        .role-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 16px 12px;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .role-label .icon { font-size: 26px; }
        .role-option:checked + .role-label {
            border-color: #c084fc;
            background: rgba(192,132,252,0.15);
            color: #e9d5ff;
            box-shadow: 0 0 0 3px rgba(192,132,252,0.15);
        }

        .btn-signup {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 24px rgba(139,92,246,0.4);
            margin-top: 10px;
        }
        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139,92,246,0.55);
        }
        .btn-signup:active { transform: translateY(0); }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: rgba(255,255,255,0.25);
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.12);
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }
        .login-link a {
            color: #c084fc;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .login-link a:hover { color: #e9d5ff; }

        .alert-error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.35);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            color: #fca5a5;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
        <div class="logo">
            <span class="logo-icon">✨</span>
            <h1>Create Account</h1>
            <p>Join EduManage Pro today</p>
        </div>

        {% if error %}
        <div class="alert-error">
            <span>⚠️</span> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/signup">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="signup-username">Username</label>
                <input type="text" id="signup-username" name="username" placeholder="Choose a username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" name="password" placeholder="Create a strong password" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>Account Type</label>
                <div class="role-grid">
                    <span>
                        <input type="radio" class="role-option" id="role-user" name="role" value="user" checked>
                        <label class="role-label" for="role-user">
                            <span class="icon">👤</span>
                            User
                        </label>
                    </span>
                    <span>
                        <input type="radio" class="role-option" id="role-admin" name="role" value="admin">
                        <label class="role-label" for="role-admin">
                            <span class="icon">🛡️</span>
                            Admin
                        </label>
                    </span>
                </div>
            </div>
            <div class="form-group" id="studentLink" style="display:block">
                <label>Link Student (optional)</label>
                <select name="student_id" style="width:100%">
                    <option value="">Select roll no (for user privacy)</option>
                    {% for s in student_choices or [] %}
                        <option value="{{ s.id }}">{{ s.roll_no }} — {{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn-signup" id="signup-btn">Create Account →</button>
        </form>

        <div class="divider">or</div>

        <div class="login-link">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</body>
</html>
