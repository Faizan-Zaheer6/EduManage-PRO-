<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Student — EduManage Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Outfit',sans-serif;background:#020617;color:#e2e8f0;display:flex;min-height:100vh}
        .sidebar{width:260px;min-height:100vh;background:#0b1120;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;padding:32px 20px;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
        .main{margin-left:260px;flex:1;padding:40px 48px;display:flex;align-items:center;justify-content:center}
        .glass-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:40px;width:100%;max-width:500px}
        .header{margin-bottom:32px;text-align:center}
        .header h1{font-size:1.8rem;font-weight:900;margin-bottom:8px}
        .header p{color:#64748b;font-size:.9rem}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;color:#475569;margin-bottom:8px;letter-spacing:.05em}
        .form-group input, .form-group select{width:100%;padding:14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;outline:none;transition:border-color .2s}
        .form-group input:focus{border-color:#6366f1}
        .btn-save{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:16px;border-radius:12px;font-weight:700;border:none;cursor:pointer;width:100%;margin-top:12px}
        .btn-cancel{display:block;text-align:center;color:#475569;text-decoration:none;font-size:14px;margin-top:16px}
    </style>
</head>
<body>
<nav class="sidebar">
    <div class="sidebar-logo">⚡ EduManage Pro</div>
</nav>
<main class="main">
    <div class="glass-card">
        <div class="header">
            <h1>Edit Student</h1>
            <p>Modify details for {{ student.name }}</p>
        </div>
        <form action="/student/{{ student.id }}/edit" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ student.name }}" required>
            </div>
            <div class="form-group">
                <label>Roll Number</label>
                <input type="text" name="roll_no" value="{{ student.roll_no }}" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="{{ student.email }}" required>
            </div>
            <div class="form-group">
                <label>Course Program</label>
                <select name="course">
                    {% for c in courses %}
                    <option value="{{ c.title }}" {% if c.title == student.course %}selected{% endif %}>{{ c.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <button class="btn-save">Update Record</button>
            <a href="/view-records" class="btn-cancel">Cancel and Go Back</a>
        </form>
    </div>
</main>
</body>
</html>
